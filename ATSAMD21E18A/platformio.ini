; =============================================================================
; LED MCU Firmware
; Target: ATSAMD21E18A (Adafruit Trinket M0, 256KB flash / 32KB RAM)
; Purpose: NeoPixel ring animation engine, controlled via I2C slave interface
; =============================================================================

[env:trinket_m0]
platform = atmelsam
board = adafruit_trinket_m0
framework = arduino

lib_ldf_mode = chain+
lib_ignore = Adafruit TinyUSB Library, Adafruit_TinyUSB_Arduino

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    cmaglie/FlashStorage @ ^1.0.0

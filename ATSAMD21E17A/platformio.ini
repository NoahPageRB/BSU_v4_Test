; =============================================================================
; LED MCU Firmware
; Target: ATSAMD21E17A (Trinket M0 pinout, but with 128KB flash / 16KB RAM)
; Purpose: NeoPixel ring animation engine, controlled via I2C slave interface
; =============================================================================

[env:trinket_m0]
platform = atmelsam
board = adafruit_trinket_m0
framework = arduino

; Override flash/RAM sizes for E17A (vs E18A on stock Trinket M0).
; 122880 = 128KB total - 8KB reserved for the UF2 bootloader.
board_upload.maximum_size = 122880
board_upload.maximum_ram_size = 16384

; bossac 1.9+ is required for --offset=0x2000 support.
platform_packages =
    platformio/tool-bossac@~1.10900.0

; post_uf2.py handles three E17A fixups:
;   - Swaps linker script to linker/flash_with_bootloader_e17a.ld (16KB RAM)
;   - Fixes bossac flags (-U syntax + adds --offset 0x2000)
;   - Generates firmware.uf2 for drag-and-drop upload
extra_scripts = post:post_uf2.py

lib_ldf_mode = chain+
lib_ignore = Adafruit TinyUSB Library, Adafruit_TinyUSB_Arduino

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0
    cmaglie/FlashStorage @ ^1.0.0

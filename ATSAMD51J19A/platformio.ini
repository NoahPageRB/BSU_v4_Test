; =============================================================================
; BSU v4 — Motor, Sensor, Drawer & Solenoid Test CLI
; Target: Adafruit Metro M4 Express (ATSAMD51J19A)
; =============================================================================

[env:metro_m4]
platform = atmelsam
board = adafruit_metro_m4
framework = arduino
monitor_speed = 115200

lib_deps =
    janelia-arduino/TMC2209 @ ^10.1.1
    janelia-arduino/TMC429 @ ^2.4.0

; Wire library MUST be excluded: its SERCOM5 interrupt handlers conflict with
; the Z2 motor UART (both need SERCOM5). We use bitbang I2C (SoftI2C) instead.
lib_ignore = Wire
